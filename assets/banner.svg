<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Universal AI Job Acquisition Agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12122b"/>
      <stop offset="1" stop-color="#1f1f4d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c7cf0"/>
      <stop offset="1" stop-color="#4fd1a5"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle pipeline motif -->
  <g stroke="#3a3a7a" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M60 250 H300 M340 250 H580 M620 250 H860 M900 250 H1140"/>
    <circle cx="320" cy="250" r="6" fill="#5b5bd6" stroke="none"/>
    <circle cx="600" cy="250" r="6" fill="#5b5bd6" stroke="none"/>
    <circle cx="880" cy="250" r="6" fill="#5b5bd6" stroke="none"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8b8bc9">
    <text x="120" y="285">Parse</text>
    <text x="390" y="285">Analyze</text>
    <text x="672" y="285">Rank &amp; Explain</text>
    <text x="965" y="285">Apply &amp; Track</text>
  </g>

  <!-- title -->
  <text x="64" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#f2f2ff">Universal AI Job Acquisition Agent</text>
  <rect x="66" y="150" width="360" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="64" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#b8b8e6">An explainable AI career platform — every score shows its work.</text>

  <!-- corner tag -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="1078" y="44" width="140" height="34" rx="17" fill="none" stroke="#5b5bd6" stroke-width="1.5"/>
    <text x="1148" y="66" font-size="15" fill="#a5a5e8" text-anchor="middle">v1.0.0-rc1</text>
  </g>
</svg>
