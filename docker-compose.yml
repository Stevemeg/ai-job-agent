# Full stack: PostgreSQL + FastAPI + Streamlit.
#
#   docker compose up --build
#
#   UI:   http://localhost:8501
#   API:  http://localhost:8000/docs
#   DB:   localhost:5432 (ai_job_agent / see .env)
#
# ./data and ./uploads are bind-mounted, so profiles, corpora, and rankings
# are shared between containers AND with host-side CLI runs (resume tailoring
# via Ollama still runs on the host -- it needs the Ollama daemon).
#
# The old backend/database/docker-compose.yml still works standalone for
# DB-only local development; this file is the one-command full stack.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai_job_agent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${DB_NAME:-ai_job_agent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_job_agent} -d ${DB_NAME:-ai_job_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: uvicorn backend.api.app:app --host 0.0.0.0 --port 8000
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-ai_job_agent}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      DB_NAME: ${DB_NAME:-ai_job_agent}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - models:/models
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  ui:
    build: .
    restart: unless-stopped
    command: streamlit run backend/ui/app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-ai_job_agent}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      DB_NAME: ${DB_NAME:-ai_job_agent}
      # Optional: hosted LLM inside containers (local Ollama isn't reachable
      # from Docker). Set in .env; empty means document generation is off.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - models:/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  models:
