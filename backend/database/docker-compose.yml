# Run from the directory containing this file:
#   docker compose up -d
#
# This starts a local Postgres instance with the schema already applied.
# Data persists in the named volume "ai_job_agent_pgdata" across restarts;
# to fully reset, run: docker compose down -v

services:
  postgres:
    image: postgres:16
    container_name: ai_job_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_job_agent
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: ai_job_agent
    ports:
      - "5432:5432"
    volumes:
      - ai_job_agent_pgdata:/var/lib/postgresql/data
      # Auto-runs any .sql file in this dir, in filename order, on FIRST boot only
      # (Postgres skips this entirely if the data volume already has data).
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_job_agent -d ai_job_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai_job_agent_pgdata: